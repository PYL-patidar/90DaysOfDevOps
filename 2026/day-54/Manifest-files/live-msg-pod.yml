apiVersion: v1
kind: Pod
metadata:
    name: configmap-live-pod
spec:
  containers:
    - name: reader
      image: busybox
      command: ["/bin/sh","-c"]
      args:
        - while true; do
            echo "Message from ConfigMap:";
            cat /config/message;
            echo "";
            sleep 5;
          done
      volumeMounts:
      - name: config-volume
        mountPath: /config

  volumes:
  - name: config-volume
    configMap:
      name: live-config
