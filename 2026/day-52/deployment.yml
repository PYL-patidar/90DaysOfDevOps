kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-deployment
  namespace: dev
  labels:
    app: nginx

spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx-pod-dev
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx-cont
        image: nginx:1.24
        ports:
        - containerPort: 80
