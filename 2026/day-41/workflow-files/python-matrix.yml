name: python lint

on:
    push:
        branches: [main,dev]

jobs:
    validate:
        runs-on: ${{ matrix.os }}
        strategy:
          fail-fast: false
          matrix:
            python-version: ["3.9", "3.10", "3.11"]
            os : [ubuntu-latest, windows-latest]
            exclude:
              - os: windows-latest
                python-version: "3.11"

        steps:
            - name: checkout code
              uses: actions/checkout@v4
            
            - name: Set python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}
            
            - name: install libraries & dependencies
              run : pip install -r requirements.txt

            - name: run linter
              run : flake8 app.py
