## Task 1
Q1) Why was Kubernetes created? What problem does it solve that Docker alone cannot?
ANS: Earlier, if we wanted to run a Docker container, we could start it manually on a server. But when the traffic increased, one server was not
enough and we needed more servers. In that case, we had to manualy create and run containers on each servers. Also if container crashed, we had
to restart it manually.
To solve this problem, Kubernetes was created. Kubernetes helps to automatically create and manage multiple containers across many servers. It 
can scale containers when traffic increases and restart them automatically if they failed.

Q2) Who created Kubernetes and what was it inspired by. 
ANS: Kubernetes was created by google. Google had problems managing containers, such as auto healing and auto scaling, because many things done
by manually. To solve this, Google first built an internal tool called "Borg", that could automaticaly scal and manage conatianers. Later, in 2014
Google release Kubernetes as an open source project inspired by Borg. Today Kubernetes is managed by the Cloud Native Computing Foundation under 
the Linux Foundation.

Q3) What does the name "Kubernetes" mean?
ANS: The name Kubernetes comes from a greek word which means "helmsman" or "ship pilot". It represents someone who steers or controls a ship.

## Task 2
Q1) What happens when you run kubectl apply -f pod.yaml? Trace the request through each component.
ANS: When we run `kubectl apply -f pod.yml`, the request goes through several kubernetes components. 
1) kubectl  
The `kubectl` command reads the pod.yml file and sends the request to the Kubernetes API Server.  
2) API Server  
The API Server receives the request, validate the YML configuration and check the auhtentication and autorization.  
3) etcd  
After validation, the desired state of the Pod is stored in etcd, which is the Kubernetes clusters database.
4) Scheduler
The Scheduler choose the worker node to run the Pod.
5) Kubelet
The Kubelet on the selected worker node receive the insturction and starts creating Pod.

Q2) What happens if the API server goes down?
ANS: If the API Server goes down, kubectl cannot send request to the cluster, because the API Server is the entrypoint for all kubernetes operations. 
Also the other components like Scheduler and Controller manager cannot communicate with the cluster state. cluster components
cannot update the state, but existing Pods may continue running.

Q3) What happens if a worker node goes down?
ANS: If the worker node goes down, the Pods running on that node will stoped working. The Kubernetes Controller Manager detects that node is not 
availabel. Then Kubernetes create a new Pods on the other healty worker node to keep the application running.

Kubectl is a command line tool for communicate wuth the Kubernetes cluster.  

For the cluster, I chose kind because it provides Kubernetes in Docker. It creates Kubernetes nodes as Docker containers, which makes it 
easy to run a cluster on a local system. It is lightweight, fast, and very useful for learning and testing Kubernetes locally using Docker.  

Q4) What is a kubeconfig? Where is it stored on your machine?  
A kubeconfig file is a configuration file used by kubectl to connect to a Kubernetes cluster. It contains information about the cluster,
user credentials, and context so kubectl knows which cluster to connect to and how to authenticate.

Location: By default, the kubeconfig file is stored at `~/.kube/config`.

Q5) What each kube-system pod does?
In Kubernetes, the kube-system namespace contains pods that run the core cluster components.
kube-apiserver → Entry point of the cluster, handles requests from kubectl
kube-scheduler → Decides which node will run the Pod
kube-controller-manager → Maintains the desired state of the cluster
etcd → Stores cluster data
kube-proxy → Manages networking between services and Pods
CoreDNS → Provides DNS inside the cluster.
